name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck -x -S warning bin/ctx lib/*.sh lib/*.bash install.sh test/*.sh scripts/install-git-hooks.sh scripts/git-hooks/commit-msg scripts/git-hooks/prepare-commit-msg scripts/git-hooks/post-commit

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run unit tests
        run: bash test/test.sh

  # Ensures default-branch history never credits the IDE vendor bot (GitHub Contributors graph keys off authors + Co-authored-by lines).
  git-history-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fail if vendor bot appears in authors or co-author trailers
        run: |
          set -euo pipefail
          if git log --format='%ae%n%ce' HEAD | grep -qiE 'cursoragent|@cursor\.com|noreply@anthropic|@anthropic\.com|@openai\.com'; then
            echo "Blocked: commit author/committer email references a coding-agent / vendor bot." >&2
            echo "Matching commits (hash author-email committer-email):" >&2
            git log --format='%h %ae %ce' HEAD | grep -iE 'cursoragent|@cursor\.com|noreply@anthropic|@anthropic\.com|@openai\.com' >&2 || true
            exit 1
          fi
          if git log --format='%an%n%cn' HEAD | grep -qiE 'cursoragent|claude[[:space:]]+sonnet|claude[[:space:]]+opus|claude[[:space:]]+haiku'; then
            echo "Blocked: commit author/committer name references a coding-agent bot identity." >&2
            echo "Matching commits (hash author-name | committer-name):" >&2
            git log --format='%h %an | %cn' HEAD | grep -iE 'cursoragent|claude[[:space:]]+sonnet|claude[[:space:]]+opus|claude[[:space:]]+haiku' >&2 || true
            exit 1
          fi
          if git log --format='%B' HEAD | grep -iE '^co-authored-by:.*(cursoragent|@cursor\.com|anthropic|noreply@anthropic|openai\.com|@openai\.|chatgpt|gemini|codeium|windsurf|github[^\n]*copilot|copilot@|claude[[:space:]]+(sonnet|opus|haiku)|cursor[[:space:]]*<)'; then
            echo "Blocked: Co-authored-by trailer credits a coding agent." >&2
            echo "Matching trailer lines:" >&2
            git log --format='%B' HEAD | grep -iE '^co-authored-by:.*(cursoragent|@cursor\.com|anthropic|noreply@anthropic|openai\.com|@openai\.|chatgpt|gemini|codeium|windsurf|github[^\n]*copilot|copilot@|claude[[:space:]]+(sonnet|opus|haiku)|cursor[[:space:]]*<)' >&2 || true
            exit 1
          fi
          echo "OK: git history has no vendor-bot attribution."
